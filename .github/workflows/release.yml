name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Build installers (Windows: MSI + NSIS, macOS: dmg/zip, Linux: AppImage/deb)
      # and upload them to a draft GitHub Release for this tag.
      - run: npm run release -w @open-paw/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
