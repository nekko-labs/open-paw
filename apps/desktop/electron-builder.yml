appId: dev.ermish.nekkopaw
productName: Nekko Paw
copyright: Copyright © 2026 ermish
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
publish:
  provider: github
  owner: ermish
  repo: nekko-paw
win:
  target:
    - nsis
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}
