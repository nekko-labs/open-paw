appId: dev.nekkolabs.openpaw
productName: Open Paw
copyright: Copyright © 2026 Nekko Labs
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
publish:
  provider: github
  owner: nekko-labs
  repo: open-paw
win:
  target:
    - msi
    - nsis
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
msi:
  oneClick: false
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}
